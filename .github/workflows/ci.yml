name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Formatação (Prettier)
        run: npm run format:check

      - name: Testes (Vitest)
        run: npm test

      - name: Build (tsc + vite)
        run: npm run build

      - name: Validar JSON (manifest, firebase config, rules)
        run: |
          for f in public/manifest.json firebase.json database.rules.json .firebaserc; do
            node -e "JSON.parse(require('fs').readFileSync('$f', 'utf8'))"
          done
